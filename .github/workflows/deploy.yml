name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: edudown/frontend/package-lock.json

      - name: Install dependencies
        working-directory: edudown/frontend
        run: npm ci

      - name: Build
        working-directory: edudown/frontend
        env:
          VITE_DEMO_MODE: 'true'
        run: npm run build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: edudown/frontend/dist
          branch: gh-pages
          clean: true
